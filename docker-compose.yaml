version: '3.8'

services:
  example-app:
    image: golang:1.24.7-alpine
    ports:
      - target: 8080
        published: 8085
        protocol: tcp
        mode: host
    volumes:
      - ./:/app
    working_dir: /app
    command: go run ./examples/go-app/main.go
    environment:
      - MY_SECRET=/var/run/secrets/users-service-db-dsn
    secrets:
      - users-service-db-dsn

  cloud-secrets:
    image: swarmdeployorg/cloud-secrets:v0.1.1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      - CLOUDRU_PROJECT_ID=<cloudru-project-id>
      - CLOUDRU_IAM_CLIENT_ID=/var/run/secrets/iam_id
      - CLOUDRU_IAM_CLIENT_SECRET=/var/run/secrets/iam_secret
      - CLOUDRU_ROOT_FOLDER=/
 #     - CLOUDRU_ROOT_FOLDER_OMIT_PREFIX=false
      - CS_LOG_LEVEL=debug
      - CS_REFRESH_INTERVAL=1m
      - CS_CLEANUP_ORPHANED=false
      - CS_SECRET_NAME_FOLDER_DELIMITER=-
      - CS_CLEANUP_ORPHANED=true
    secrets:
      - iam_id
      - iam_secret
    deploy:
      labels:
        - prometheus.port=8000
      placement:
        constraints:
          - node.role == manager

secrets:
  # Секреты для тестового приложения
  users-service-db-dsn:
    external: true
  # Креды для IAM
  iam_id:
    external: true
  iam_secret:
    external: true
